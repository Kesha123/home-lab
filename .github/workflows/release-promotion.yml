---
name: Release Promotion

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next release tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/calculate_next_tag.sh '${{ inputs.bump }}' "${GITHUB_OUTPUT}"

      - name: Create annotated tag
        shell: bash
        run: |
          set -euo pipefail

          tag='${{ steps.bump.outputs.next_tag }}'
          if ! git tag -a "${tag}" -m "Release ${tag}"; then
            echo "::error title=Tag creation failed::Unable to create annotated tag '${tag}'"
            exit 1
          fi

      - name: Push tag
        shell: bash
        run: |
          set -euo pipefail

          tag='${{ steps.bump.outputs.next_tag }}'
          if ! git push origin "refs/tags/${tag}"; then
            echo "::error title=Tag push failed::Unable to push tag '${tag}' to origin"
            exit 1
          fi
