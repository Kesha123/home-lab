---
name: Release Promotion

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next release tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag='0.0.0'
          fi

          if [[ ! "${latest_tag}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid latest tag::Latest matching tag '${latest_tag}' is not strict semver X.Y.Z"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "${latest_tag}"
          case '${{ inputs.bump }}' in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "::error title=Invalid bump input::Unsupported bump '${{ inputs.bump }}'"
              exit 1
              ;;
          esac

          next_tag="${major}.${minor}.${patch}"
          if git rev-parse --verify --quiet "refs/tags/${next_tag}" >/dev/null; then
            echo "::error title=Tag already exists::Tag '${next_tag}' already exists"
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "next_tag=${next_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create annotated tag
        shell: bash
        run: |
          set -euo pipefail

          tag='${{ steps.bump.outputs.next_tag }}'
          if ! git tag -a "${tag}" -m "Release ${tag}"; then
            echo "::error title=Tag creation failed::Unable to create annotated tag '${tag}'"
            exit 1
          fi

      - name: Push tag
        shell: bash
        run: |
          set -euo pipefail

          tag='${{ steps.bump.outputs.next_tag }}'
          if ! git push origin "refs/tags/${tag}"; then
            echo "::error title=Tag push failed::Unable to push tag '${tag}' to origin"
            exit 1
          fi
