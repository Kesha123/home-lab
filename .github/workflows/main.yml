---
name: Main (Alias)

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: Build tag passed to wrapper workflows
        required: false
        type: string
        default: ''
      publish:
        description: Publish container images when true
        required: false
        type: boolean
        default: false

jobs:
  forward-to-ci-main:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/ci-main.yml
    with:
      build_tag: ${{ inputs.build_tag }}
      publish: ${{ inputs.publish }}
