---
name: CI Main

on:
  workflow_call:
    inputs:
      build_tag:
        description: Build tag passed to wrapper workflows
        required: false
        type: string
        default: ''
      publish:
        description: Publish container images when true
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      build_tag:
        description: Build tag passed to wrapper workflows
        required: false
        type: string
        default: ''
      publish:
        description: Publish container images when true
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - docker/**
      - docs/**
      - workflows/**
      - Makefile
      - Makefile-*.mk
      - .ansible-lint
      - .yamllint.yaml
      - .github/workflows/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  resolve-inputs:
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.resolve.outputs.build_tag }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve orchestration inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/resolve_ci_main_inputs.sh \
            '${{ github.event_name }}' \
            '${{ inputs.build_tag }}' \
            '${{ inputs.publish }}' \
            '${{ github.sha }}' \
            "${GITHUB_OUTPUT}"

  container-ansible-runner:
    needs: resolve-inputs
    uses: ./.github/workflows/wrapper-container-ansible-runner.yml
    permissions:
      contents: read
      packages: write
    with:
      publish: ${{ needs.resolve-inputs.outputs.publish == 'true' }}
      build_tag: ${{ needs.resolve-inputs.outputs.build_tag }}

  container-mkdocs:
    needs: resolve-inputs
    uses: ./.github/workflows/wrapper-container-mkdocs.yml
    permissions:
      contents: read
      packages: write
    with:
      publish: ${{ needs.resolve-inputs.outputs.publish == 'true' }}
      build_tag: ${{ needs.resolve-inputs.outputs.build_tag }}

  docs:
    needs: resolve-inputs
    uses: ./.github/workflows/wrapper-docs.yml
    with:
      build_tag: ${{ needs.resolve-inputs.outputs.build_tag }}
      publish_pages: false

  workflow-k3s-install:
    needs: resolve-inputs
    uses: ./.github/workflows/wrapper-workflow-k3s-install.yml
    with:
      build_tag: ${{ needs.resolve-inputs.outputs.build_tag }}

  workflow-rpi-os-setup:
    needs: resolve-inputs
    uses: ./.github/workflows/wrapper-workflow-rpi-os-setup.yml
    with:
      build_tag: ${{ needs.resolve-inputs.outputs.build_tag }}

  workflow-software-install:
    needs: resolve-inputs
    uses: ./.github/workflows/wrapper-workflow-software-install.yml
    with:
      build_tag: ${{ needs.resolve-inputs.outputs.build_tag }}
