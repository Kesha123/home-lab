name: Reusable Build Container

on:
  workflow_call:
    inputs:
      container_name:
        description: Container name used in make target path
        required: true
        type: string
      publish:
        description: Push container to registry
        required: false
        type: boolean
        default: false
      build_tag:
        description: Container tag passed to make
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      container_name:
        description: Container name used in make target path
        required: true
        type: string
      publish:
        description: Push container to registry
        required: false
        type: boolean
        default: false
      build_tag:
        description: Container tag passed to make
        required: false
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.container_name }}-${{ inputs.publish }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ !inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container
        shell: bash
        run: |
          set -euo pipefail
          make BUILD_TAG='${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}' 'build/container/${{ inputs.container_name }}'

  publish:
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container
        shell: bash
        run: |
          set -euo pipefail
          make BUILD_TAG='${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}' 'push/container/${{ inputs.container_name }}'
