name: Build Container

on:
  workflow_dispatch:
    inputs:
      entity:
        description: Container name
        required: true
        type: string
      publish:
        description: Push image to GHCR
        required: false
        type: boolean
        default: false
      build_tag:
        description: Build tag for the container
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      entity:
        description: Container name
        required: true
        type: string
      publish:
        description: Push image to GHCR
        required: false
        type: boolean
        default: false
      build_tag:
        description: Build tag for the container
        required: false
        type: string
        default: ''

jobs:
  build-container:
    uses: ./.github/workflows/reusable-build-container.yml
    with:
      container_name: ${{ inputs.entity }}
      publish: ${{ inputs.publish }}
      build_tag: ${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}
