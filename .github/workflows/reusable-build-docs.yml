name: Reusable Build Docs

on:
  workflow_call:
    inputs:
      build_tag:
        description: Build tag passed to make
        required: false
        type: string
        default: ''
      publish_pages:
        description: Deploy built docs to GitHub Pages
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      build_tag:
        description: Build tag passed to make
        required: false
        type: string
        default: ''
      publish_pages:
        description: Deploy built docs to GitHub Pages
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.publish_pages }}
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docs with make
        shell: bash
        run: |
          set -euo pipefail
          make BUILD_TAG='${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}' ci/docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: target/mkdocs/site.tar.gz
          if-no-files-found: error

  deploy-pages:
    if: ${{ inputs.publish_pages }}
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: target

      - name: Restore docs site from archive
        shell: bash
        run: |
          set -euo pipefail
          rm -rf target/mkdocs
          mkdir -p target/mkdocs
          tar -xzf target/site.tar.gz -C target/mkdocs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/mkdocs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
