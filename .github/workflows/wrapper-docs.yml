---
name: Wrapper Docs

on:
  workflow_call:
    inputs:
      build_tag:
        description: Build tag passed to make
        required: false
        type: string
        default: ''
      publish_pages:
        description: Deploy built docs to GitHub Pages
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      build_tag:
        description: Build tag passed to make
        required: false
        type: string
        default: ''
      publish_pages:
        description: Deploy built docs to GitHub Pages
        required: false
        type: boolean
        default: true

jobs:
  build-docs:
    uses: ./.github/workflows/reusable-build-docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      build_tag: ${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}
      publish_pages: ${{ inputs.publish_pages }}
