---
name: Wrapper Container Ansible Runner

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Push image to GHCR
        required: false
        type: boolean
        default: false
      build_tag:
        description: Build tag for the container
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      publish:
        description: Push image to GHCR
        required: false
        type: boolean
        default: false
      build_tag:
        description: Build tag for the container
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build-container:
    uses: ./.github/workflows/reusable-build-container.yml
    permissions:
      contents: read
      packages: write
    with:
      container_name: ansible-runner
      publish: ${{ inputs.publish }}
      build_tag: ${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}
