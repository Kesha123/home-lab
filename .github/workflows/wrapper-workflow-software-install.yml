---
name: Wrapper Workflow Software Install

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: Build tag for the workflow package
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      build_tag:
        description: Build tag for the workflow package
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build-workflow:
    uses: ./.github/workflows/reusable-build-workflow.yml
    with:
      workflow_name: software-install
      build_tag: ${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}
