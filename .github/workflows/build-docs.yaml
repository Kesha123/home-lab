name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - docs/**
  workflow_dispatch:
    inputs:
      build_tag:
        description: Build tag for docs image/site
        required: false
        type: string
        default: ''
      publish_pages:
        description: Deploy docs to GitHub Pages
        required: false
        type: boolean
        default: false

jobs:
  build-docs-on-push:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/reusable-build-docs.yml
    with:
      build_tag: ${{ github.sha }}
      publish_pages: false

  build-docs-on-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-build-docs.yml
    with:
      build_tag: ${{ inputs.build_tag != '' && inputs.build_tag || github.sha }}
      publish_pages: ${{ inputs.publish_pages }}
